name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests (oss flavor)
        run: ./gradlew testOssDebugUnitTest --stacktrace

      - name: Lint (oss flavor)
        run: ./gradlew lintOssDebug --stacktrace

      - name: Assemble debug APK (oss flavor)
        run: ./gradlew assembleOssDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-oss-debug
          path: app/build/outputs/apk/oss/debug/*.apk
          if-no-files-found: warn
